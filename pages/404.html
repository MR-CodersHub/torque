<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Lost Calibration | Auto-Mobiles</title>
  <meta name="description" content="Oops! The telemetry endpoint you are trying to ping does not exist. Connect back to base station.">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.359.0/dist/umd/lucide.min.js"></script>
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between;">
  <a href="#main-content" class="skip-link">Skip to main content</a>

 <!-- Header Section -->
  <header>
    <div class="container nav-container">
      <a href="../index.html" class="logo" aria-label="Auto-Mobiles Home">
        <img src="../assets/images/logo.svg" class="brand-logo">TORQUE
      </a>

      <div class="nav-controls">
        <button class="control-btn theme-toggle" aria-label="Toggle Theme">
          <i data-lucide="sun"></i>
        </button>
        <!-- <button class="control-btn dir-toggle" aria-label="Toggle Layout Direction">
          <span style="font-size: 0.75rem; font-weight: 700;">RTL</span>
        </button> -->
      </div>
    </div>
  </header>

  <!-- Game Section Area -->
  <main id="main-content" class="err-404-container container">
    <div style="z-index: 10;">
      <h1 class="err-404-title">404</h1>
      <h2 class="mb-4">Lost Calibration</h2>
      <p style="max-width: 500px; margin-inline: auto; margin-bottom: var(--space-6);">
        This telemetry node has disconnected from the grid. Reconnect floating data units below or return to base.
      </p>
      
      <!-- Interactive Reconnect Mini-Game Canvas -->
      <div class="glass-panel" style="padding: var(--space-2); margin-inline: auto; margin-bottom: var(--space-6); width: 100%; max-width: 550px;">
        <canvas id="game-canvas" width="500" height="200" style="background: var(--bg-tertiary); display: block; border-radius: var(--border-radius-sm); max-width: 100%; cursor: pointer;"></canvas>
        <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: var(--space-2);">
          Move cursor to reconnect node parameters. Click to add a packet.
        </div>
      </div>

      <a href="../index.html" class="btn btn-primary">
        <i data-lucide="home"></i> Return to Base Station
      </a>
    </div>
  </main>


  <script src="../assets/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const canvas = document.getElementById('game-canvas');
      const ctx = canvas.getContext('2d');
      
      const particles = [];
      const numParticles = 25;
      
      // Mouse coordinates tracker
      const mouse = { x: null, y: null };
      
      class Particle {
        constructor() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.vx = (Math.random() - 0.5) * 1.5;
          this.vy = (Math.random() - 0.5) * 1.5;
          this.radius = Math.random() * 3 + 2;
        }
        
        update() {
          this.x += this.vx;
          this.y += this.vy;
          
          if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
          if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }
        
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fillStyle = '#06B6D4';
          ctx.fill();
        }
      }
      
      for (let i = 0; i < numParticles; i++) {
        particles.push(new Particle());
      }
      
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        particles.forEach(p => {
          p.update();
          p.draw();
        });
        
        // Connect close nodes
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < 60) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(6, 182, 212, ${1 - dist/60})`;
              ctx.lineWidth = 1;
              ctx.stroke();
            }
          }
          
          // Connect to mouse
          if (mouse.x !== null && mouse.y !== null) {
            const dx = particles[i].x - mouse.x;
            const dy = particles[i].y - mouse.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < 80) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(mouse.x, mouse.y);
              ctx.strokeStyle = `rgba(245, 158, 11, ${1 - dist/80})`; // Gold line to mouse
              ctx.lineWidth = 1.5;
              ctx.stroke();
            }
          }
        }
        
        requestAnimationFrame(animate);
      }
      
      canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
        mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
      });
      
      canvas.addEventListener('mouseleave', () => {
        mouse.x = null;
        mouse.y = null;
      });

      canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const newP = new Particle();
        newP.x = (e.clientX - rect.left) * (canvas.width / rect.width);
        newP.y = (e.clientY - rect.top) * (canvas.height / rect.height);
        particles.push(newP);
        if (particles.length > 50) particles.shift(); // Cap count
      });
      
      animate();
    });
  </script>
</body>
</html>
