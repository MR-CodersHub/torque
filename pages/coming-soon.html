<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon | Auto-Mobiles Launching</title>
  <meta name="description" content="We are calibrating our new firmware telemetry hub. Sign up to stay notified of the official opening launch details.">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.359.0/dist/umd/lucide.min.js"></script>
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between;">
  <a href="#main-content" class="skip-link">Skip to main content</a>

   <!-- Header Section -->
  <header>
    <div class="container nav-container">
      <a href="../index.html" class="logo" aria-label="Auto-Mobiles Home">
        <img src="../assets/images/logo.svg" class="brand-logo">TORQUE
      </a>

      <div class="nav-controls">
        <button class="control-btn theme-toggle" aria-label="Toggle Theme">
          <i data-lucide="sun"></i>
        </button>
        <!-- <button class="control-btn dir-toggle" aria-label="Toggle Layout Direction">
          <span style="font-size: 0.75rem; font-weight: 700;">RTL</span>
        </button> -->
      </div>
    </div>
  </header>

  <!-- Coming Soon Timer Main Area -->
  <main id="main-content" class="flex-center" style="flex: 1; padding: var(--space-8); position: relative; overflow: hidden; text-align: center;">
    <div class="animated-bg"></div>
    
    <div class="glass-panel" style="width: 100%; max-width: 600px; padding: var(--space-8); z-index: 10;">
      <span class="card-tag" style="margin-inline: auto;">Calibration Phase</span>
      <h1 class="mt-4 mb-4" style="font-family: var(--font-headings); font-size: clamp(1.8rem, 4vw, 2.5rem);">System Launch Approaching</h1>
      <p style="margin-bottom: var(--space-8); font-size: 0.95rem;">
        We are completing dyno tests and server scaling benchmarks. The telemetry grid is initializing.
      </p>

      <!-- Live countdown numbers -->
      <div class="countdown-container">
        <div class="countdown-box">
          <span class="countdown-val" id="days">30</span>
          <span class="countdown-label">Days</span>
        </div>
        <div class="countdown-box">
          <span class="countdown-val" id="hours">00</span>
          <span class="countdown-label">Hours</span>
        </div>
        <div class="countdown-box">
          <span class="countdown-val" id="minutes">00</span>
          <span class="countdown-label">Mins</span>
        </div>
        <div class="countdown-box">
          <span class="countdown-val" id="seconds">00</span>
          <span class="countdown-label">Secs</span>
        </div>
      </div>

      <!-- Notification form -->
      <form class="needs-validation" novalidate style="margin-top: var(--space-8); max-width: 440px; margin-inline: auto;">
        <h4 style="font-family: var(--font-primary); font-weight: 600; margin-bottom: var(--space-3);">Notify Me At Launch</h4>
        <div class="form-group" style="display: flex; gap: var(--space-2); margin-bottom: 0;">
          <div style="flex: 1; position: relative;">
            <input type="email" required placeholder="Enter email address" class="form-control" style="border-radius: var(--border-radius-sm) 0 0 var(--border-radius-sm);" />
            <div class="tooltip">Please enter a valid email.</div>
          </div>
          <button type="submit" class="btn btn-primary" style="border-radius: 0 var(--border-radius-sm) var(--border-radius-sm) 0;">
            Notify
          </button>
        </div>
      </form>

    </div>
  </main>

  <script src="../assets/js/app.js"></script>
  <script>
    // Launch Date Countdown Timer
    document.addEventListener('DOMContentLoaded', () => {
      // Set launch date to 30 days from now
      const launchDate = new Date();
      launchDate.setDate(launchDate.getDate() + 30);
      
      const dVal = document.getElementById('days');
      const hVal = document.getElementById('hours');
      const mVal = document.getElementById('minutes');
      const sVal = document.getElementById('seconds');
      
      function updateTimer() {
        const now = new Date();
        const diff = launchDate - now;
        
        if (diff <= 0) {
          dVal.textContent = '00';
          hVal.textContent = '00';
          mVal.textContent = '00';
          sVal.textContent = '00';
          return;
        }
        
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);
        
        dVal.textContent = days.toString().padStart(2, '0');
        hVal.textContent = hours.toString().padStart(2, '0');
        mVal.textContent = minutes.toString().padStart(2, '0');
        sVal.textContent = seconds.toString().padStart(2, '0');
      }
      
      setInterval(updateTimer, 1000);
      updateTimer();
    });
  </script>
</body>
</html>
