<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Management | Auto-Mobiles Portal</title>
  <meta name="description" content="Sign in to your fleet telemetry dashboard, update credentials, or create a developer calibration profile.">
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.359.0/dist/umd/lucide.min.js"></script>
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between;">
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Header Section -->
  <header>
    <div class="container nav-container">
      <a href="../index.html" class="logo" aria-label="Auto-Mobiles Home">
        <img src="../assets/images/logo.svg" class="brand-logo">TORQUE
      </a>

      <div class="nav-controls">
        <button class="control-btn theme-toggle" aria-label="Toggle Theme">
          <i data-lucide="sun"></i>
        </button>
        <!-- <button class="control-btn dir-toggle" aria-label="Toggle Layout Direction">
          <span style="font-size: 0.75rem; font-weight: 700;">RTL</span>
        </button> -->
      </div>
    </div>
  </header>

  <!-- Login/Register Card Container -->
  <main id="main-content" class="flex-center" style="flex: 1; padding: var(--space-8); position: relative; overflow: hidden;">
    <div class="animated-bg"></div>
    
    <div class="glass-panel" style="width: 100%; max-width: 440px; padding: var(--space-8); position: relative; z-index: 10;">
      
      <!-- Auth Switcher Header -->
      <div style="display: flex; border-bottom: 1px solid var(--border-color); padding-bottom: var(--space-4); margin-bottom: var(--space-6); justify-content: space-around;">
        <button class="tab-btn active" id="btn-show-login" style="font-size: 1.1rem; border-bottom: 2px solid transparent;">Log In</button>
        <button class="tab-btn" id="btn-show-register" style="font-size: 1.1rem; border-bottom: 2px solid transparent;">Register</button>
      </div>

      <!-- Login Form Card -->
      <form class="needs-validation" id="form-login" novalidate style="display: flex; flex-direction: column; gap: var(--space-4);">
        <h2 style="font-family: var(--font-primary); font-size: 1.3rem; margin-bottom: var(--space-2);">Welcome Back</h2>
        
        <div class="form-group" style="margin-bottom: 0;">
          <label for="login-email" class="form-label">Email Address</label>
          <input type="email" id="login-email" required class="form-control" />
          <div class="tooltip">Please enter a valid email.</div>
        </div>

        <div class="form-group" style="margin-bottom: 0;">
          <label for="login-pass" class="form-label">Password</label>
          <input type="password" id="login-pass" required minlength="6" class="form-control" />
          <div class="tooltip">Must be at least 6 characters.</div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem;">
          <label style="display: flex; align-items: center; gap: var(--space-2);">
            <input type="checkbox" /> Remember me
          </label>
          <a href="#" style="color: var(--color-primary);">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary" style="margin-top: var(--space-2);">
          Sign In to Account
        </button>
      </form>

      <!-- Register Form Card (Initially hidden) -->
      <form class="needs-validation" id="form-register" novalidate style="display: none; flex-direction: column; gap: var(--space-4);">
        <h2 style="font-family: var(--font-primary); font-size: 1.3rem; margin-bottom: var(--space-2);">Create Calibration Account</h2>

        <div class="form-group" style="margin-bottom: 0;">
          <label for="reg-name" class="form-label">Full Name</label>
          <input type="text" id="reg-name" required class="form-control" />
          <div class="tooltip">Please enter your name.</div>
        </div>

        <div class="form-group" style="margin-bottom: 0;">
          <label for="reg-email" class="form-label">Email Address</label>
          <input type="email" id="reg-email" required class="form-control" />
          <div class="tooltip">Please enter a valid email.</div>
        </div>

        <div class="form-group" style="margin-bottom: 0;">
          <label for="reg-pass" class="form-label">Password</label>
          <input type="password" id="reg-pass" required minlength="8" class="form-control" />
          <div class="tooltip">Must be at least 8 characters.</div>
        </div>

        <label style="display: flex; align-items: flex-start; gap: var(--space-2); font-size: 0.8rem; line-height: 1.4;">
          <input type="checkbox" required /> 
          <span>I agree to the Terms of Service & telemetry data disclosure.</span>
        </label>

        <button type="submit" class="btn btn-primary" style="margin-top: var(--space-2);">
          Initialize Account
        </button>
      </form>

    </div>
  </main>

  <script src="../assets/js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const showLogin = document.getElementById('btn-show-login');
      const showRegister = document.getElementById('btn-show-register');
      const formLogin = document.getElementById('form-login');
      const formRegister = document.getElementById('form-register');

      showLogin.addEventListener('click', () => {
        showLogin.classList.add('active');
        showRegister.classList.remove('active');
        formLogin.style.display = 'flex';
        formRegister.style.display = 'none';
      });

      showRegister.addEventListener('click', () => {
        showRegister.classList.add('active');
        showLogin.classList.remove('active');
        formRegister.style.display = 'flex';
        formLogin.style.display = 'none';
      });

      // Handle simulated login success -> redirect to Admin dashboard
      formLogin.addEventListener('submit', (e) => {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        
        if (email.includes('@') && pass.length >= 6) {
          e.preventDefault();
          // Store dummy user session
          localStorage.setItem('user_session', JSON.stringify({ email: email, loginTime: new Date() }));
          // Redirect to customer dashboard
          window.location.href = 'user-dashboard.html';
        }
      });

      formRegister.addEventListener('submit', (e) => {
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const pass = document.getElementById('reg-pass').value;

        if (name && email.includes('@') && pass.length >= 8) {
          e.preventDefault();
          alert('Account initialized successfully! Redirecting to login.');
          showLogin.click();
        }
      });
    });
  </script>
</body>
</html>
